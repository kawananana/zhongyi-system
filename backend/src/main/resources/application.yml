server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: bencao-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bencao_mengzhi?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

bencao:
  jwt:
    secret: bencao-mengzhi-jwt-secret-change-in-production-min-256bits
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 604800
